name: CI

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Clean and Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build Shared Contract
        run: npm run build -w packages/sync-contract

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Backend - Test & Coverage
        run: npm run test:cov -w apps/api

      - name: Frontend - Test
        run: npm run test -w apps/web

      - name: Backend - Prisma Schema Validation
        run: |
          cd apps/api
          npx prisma validate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dummy

      - name: Build All
        run: npm run build

  release:
    needs: quality-gates
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && github.repository == 'IndexGrid/offline-first-sync-queue'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create Release Draft
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
