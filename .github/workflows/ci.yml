name: CI

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/app
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Clean and Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Change Control Check (PR)
        if: github.event_name == 'pull_request'
        run: npm run changes:check

      - name: Build Shared Contract
        run: npm run build -w packages/sync-contract

      - name: Backend - Prisma Generate
        run: npm run prisma:generate -w apps/api

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Migration Rollback Policy Check
        run: npm run migrations:rollback-check

      - name: Backend - Test & Coverage
        run: npm run test:cov -w apps/api

      - name: Frontend - Test
        run: npm run test -w apps/web

      - name: Backend - Prisma Schema Validation
        run: |
          cd apps/api
          npx prisma validate

      - name: Backend - Prisma Migration Check
        run: |
          cd apps/api
          npx prisma migrate deploy
          npx prisma migrate status

      - name: Backend - Integration Tests (Postgres)
        run: npm run test:integration -w apps/api

      - name: Backend - Contract Tests
        run: npm run test:contract -w apps/api

      - name: Backend - E2E Tests
        run: npm run test:e2e -w apps/api

      - name: Build All
        run: npm run build

  release:
    needs: quality-gates
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && github.repository == 'IndexGrid/offline-first-sync-queue'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Release Change Control Check
        run: npm run changes:release-check
      - name: Create Release Draft
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
